    <style>
        body {
                padding-top:100px;
                text-align:center; 
            }
            
            
            /* -------------菜单css代码----------begin---------- */
            .menuDiv { 
                border: 2px solid #aac; 
                overflow: hidden; 
                display:inline-block;
            }
            
            /* 去掉a标签的下划线 */
            .menuDiv a {
                text-decoration: none;
            }
            
            /* 设置ul和li的样式 */
            .menuDiv ul , .menuDiv li {
                list-style: none;
                margin: 0;
                padding: 0;
                float: left;
            } 
            
            /* 设置二级菜单绝对定位，并隐藏 */
            .menuDiv > ul > li > ul {
                position: absolute;
                display: none;
            }
        
            /* 设置二级菜单的li的样式 */
            .menuDiv > ul > li > ul > li {
                float: none;
            }
          
            /* 鼠标放在一级菜单上，显示二级菜单 */
            .menuDiv > ul > li:hover ul {
                display: block;
            }
        
            /* 一级菜单 */
            .menuDiv > ul > li > a {
                width: 120px;
                line-height: 40px;
                color: black;
                background-color: #cfe;
                text-align: center;
                border-left: 1px solid #bbf;
                display: block;
            }
            
            /* 在一级菜单中，第一个不设置左边框 */
            .menuDiv > ul > li:first-child > a {
                border-left: none;
            }
        
            /* 在一级菜单中，鼠标放上去的样式 */
            .menuDiv > ul > li > a:hover {
                color: #f0f;
                background-color: #bcf;
            }
        
            /* 二级菜单 */
            .menuDiv > ul > li > ul > li > a {
                width: 120px;
                line-height: 36px;
                color: #456;
                background-color: #eff;
                text-align: center;
                border: 1px solid #ccc;
                border-top: none;
                display: block;
            }
            
            /* 在二级菜单中，第一个设置顶边框 */
            .menuDiv > ul > li > ul > li:first-child > a {
                border-top: 1px solid #ccc;
            }
            
            /* 在二级菜单中，鼠标放上去的样式 */
            .menuDiv > ul > li > ul > li > a:hover {
                color: #a4f;
                background-color: #cdf;
            }
    </style>
